<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hospital AI Chat</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <style>
        html { font-size: 16px; }

        body { margin-bottom: 60px; }

        .aichat-area {
            min-height: 200px;
            background-color: #000000;
            color: white;
            padding: 12px;
            border-radius: 0;
            overflow-y: auto;
            height: 300px;
            font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
            font-size: 0.9rem;
        }

        table {
            border-spacing: 0;
            width: 75%;
            border: 1px solid #dddddd;
            overflow: hidden;
        }

        th, td {
            border: 1px solid #dddddd;
            text-align: left;
            padding-left: 5px;
        }

        th { background-color: #003b7a; }

        tr:nth-child(odd)  { background-color: #282829; }
        tr:nth-child(even) { background-color: #011a34; }

        /* Braille spinner (matches reference app) */
        .braille-spinner {
            position: relative;
            display: inline-block;
            width: 1ch;
            height: 1em;
            line-height: 1;
            font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
            vertical-align: middle;
        }

        .braille-spinner::before {
            content: "⣿";
            position: absolute;
            inset: 0;
            color: white;
            opacity: 0.25;
        }

        .braille-spinner::after {
            content: "⠁";
            position: absolute;
            inset: 0;
            color: #4DB8FF;
            text-shadow: 0 0 6px #4DB8FF, 0 0 14px #4DB8FF,
                         0 0 28px rgba(77,184,255,0.85), 0 0 42px rgba(77,184,255,0.55);
            animation: spin 0.9s steps(8, end) infinite;
        }

        @keyframes spin {
            0%    { content: "⠁"; }
            12.5% { content: "⠈"; }
            25%   { content: "⠐"; }
            37.5% { content: "⠠"; }
            50%   { content: "⢀"; }
            62.5% { content: "⡀"; }
            75%   { content: "⠄"; }
            87.5% { content: "⠂"; }
            100%  { content: "⠁"; }
        }

        #thinking-indicator { color: #4DB8FF; margin-bottom: 8px; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light border-bottom px-3">
        <a class="navbar-brand fw-semibold" href="/">Hospital DB</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link active" href="/index.html">
                        <i class="bi bi-chat-dots me-1"></i>AI Chat
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/swagger" target="_blank">
                        <i class="bi bi-clipboard2-pulse me-1"></i>Procedures
                    </a>
                </li>
            </ul>
        </div>
    </nav>

    <div class="container-fluid px-4 mt-5">

        <h1 class="text-center mb-4">Hospital AI Chat</h1>

        <div class="mb-3">
            <label for="userMessage" class="h6">User Message:</label>
            <textarea id="userMessage" class="form-control" rows="4"
                      placeholder="Type your message and press Enter or click Send…"></textarea>
        </div>

        <div class="mb-4">
            <button id="sendBtn" class="btn btn-primary">Send</button>
        </div>

        <div id="ai-display-area" style="display:none">
            <label class="h6">AI Model Response:</label>
            <div class="aichat-area">
                <div id="thinking-indicator" style="display:none" aria-live="polite">
                    Thinking <span class="braille-spinner" aria-label="Loading" role="status"></span>
                </div>
                <div id="ai-response-content"></div>
            </div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/showdown@2.1.0/dist/showdown.min.js"></script>
    <script>
        const converter = new showdown.Converter({ tables: true });

        const sendBtn          = document.getElementById('sendBtn');
        const userMsgEl        = document.getElementById('userMessage');
        const displayArea      = document.getElementById('ai-display-area');
        const responseContent  = document.getElementById('ai-response-content');
        const thinkingIndicator = document.getElementById('thinking-indicator');

        function showThinking() {
            displayArea.style.display = 'block';
            responseContent.innerHTML = '';
            thinkingIndicator.style.display = 'block';
            sendBtn.disabled = true;
        }

        function hideThinking() {
            thinkingIndicator.style.display = 'none';
            sendBtn.disabled = false;
        }

        async function sendMessage() {
            const userMessage = userMsgEl.value.trim();

            if (!userMessage) return;

            showThinking();

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userMessage })
                });

                if (!response.ok) {
                    const err = await response.json().catch(() => ({ error: 'Unknown error' }));
                    throw new Error(err.error || `HTTP ${response.status}`);
                }

                const data = await response.json();
                hideThinking();

                const html = converter.makeHtml(data.aiResponse || '');
                responseContent.innerHTML = html || '<em>No response from AI.</em>';
            } catch (err) {
                hideThinking();
                responseContent.innerHTML = `<span style="color:#ff6b6b;">Error: ${err.message}</span>`;
            }
        }

        sendBtn.addEventListener('click', sendMessage);

        userMsgEl.addEventListener('keydown', function (e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
    </script>
</body>
</html>
